# Accessibility scan of production via ally (own axe-core a11y tool). Non-blocking/informational.
name: Ally A11y Scan

on:
  schedule:
    - cron: "30 8 * * 1" # Mondays 08:30 UTC
  workflow_dispatch:
    inputs:
      url:
        description: "URL to scan"
        required: false
        default: "https://mythosatlas.com"

permissions:
  contents: read

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ally accessibility scan
        continue-on-error: true
        uses: forbiddenlink/ally@main
        with:
          url: ${{ github.event.inputs.url || 'https://mythosatlas.com' }}
          threshold: "9999"
          output: ".ally"
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ally-a11y-report
          path: ".ally/**"
          if-no-files-found: warn
          retention-days: 30
